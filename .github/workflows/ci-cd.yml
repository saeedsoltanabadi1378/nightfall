name: ci-cd

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22"

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Nightfall.slnx

      - name: Build
        run: dotnet build Nightfall.slnx --no-restore -c Release

      - name: Test
        run: dotnet test Nightfall.slnx --no-build -c Release --logger "console;verbosity=normal"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/nightfall-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/nightfall-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # Placeholder values: this build only verifies the app compiles cleanly in CI. Vite
        # inlines VITE_* at build time, so a real deploy rebuilds the frontend image with the
        # actual public Api URL / Agora App ID (see the docker job below and docker-compose.yml).
        env:
          VITE_API_BASE_URL: https://api.nightfall.example.com
          VITE_AGORA_APP_ID: 0123456789abcdef0123456789abcdef
        run: npm run build

  docker:
    needs: [dotnet, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: src/Nightfall.Api/Dockerfile
          - service: bot
            dockerfile: src/Nightfall.Bot/Dockerfile
          - service: frontend
            dockerfile: frontend/nightfall-app/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main) ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          # Placeholder build args for the frontend image, same caveat as the frontend job above —
          # a real deploy rebuilds with the actual public Api URL / Agora App ID.
          build-args: |
            VITE_API_BASE_URL=https://api.nightfall.example.com
            VITE_AGORA_APP_ID=0123456789abcdef0123456789abcdef
          cache-from: type=gha
          cache-to: type=gha,mode=max
